[project]
name = "tactill"
version = "0.8.1"
requires-python = ">=3.14"
dependencies = [
    "httpx>=0.28",
    "pydantic>=2.12",
    "tenacity>=9.1",
]

[dependency-groups]
dev = [
    "coverage==7.13.1",
    "mypy==1.19.1",
    "pre-commit==4.5.1",
    "pytest==9.0.2",
    "pytest-vcr==1.0.2",
    "python-dotenv==1.2.1",
    "ruff==0.14.14",
    "ty==0.0.13",
]

[tool.ruff]
output-format = "concise"

[tool.ruff.lint]
select = [
    "E", "W", # pycodestyle
    "F", # Pyflakes
    "UP", # pyupgrade
    "B", # flake8-bugbear
    "SIM", # flake8-simplify
    "I", # isort
    "PL", # Pylint
    "RUF",
]
ignore = [
    "PLR0913", # Too many arguments in function definition
]

[tool.ty.terminal]
output-format = "concise"

[tool.ty.rules]
unused-ignore-comment = "ignore"  # use for mypy

[tool.mypy]
strict = true
plugins = ['pydantic.mypy']

[tool.pytest.ini_options]
testpaths = [
    "tests",
]
addopts = [
    "--log-disable=vcr.cassette",
]
log_cli = true
log_cli_level = "INFO"
log_cli_format = "%(asctime)s [%(levelname)8s] %(name)30s - %(message)s"
